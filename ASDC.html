<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASDC</title>
<style>
  :root{
    --ink:#1a1a18;          /* near-black ink */
    --paper:#f7f4ec;        /* warm record paper */
    --paper2:#fffdf8;       /* card paper */
    --line:#d9d2c2;         /* rule line */
    --line2:#e8e2d4;
    --seal:#6b1f1f;         /* oxblood seal red */
    --seal2:#8a2b2b;
    --brass:#9a7b3f;        /* brass accent */
    --green:#33543f;        /* ledger green */
    --muted:#6f685b;
    --shadow:0 1px 2px rgba(26,26,24,.06),0 8px 28px rgba(26,26,24,.07);
    --radius:6px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--paper);color:var(--ink);
    font-family:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif;
    -webkit-font-smoothing:antialiased;font-size:16px;line-height:1.5;
    overflow-x:hidden;max-width:100%}
  body{padding-bottom:80px}
  h1,h2,h3{font-weight:600;letter-spacing:.01em}
  button{font-family:inherit;cursor:pointer}
  input,select,textarea{font-family:inherit;font-size:15px}
  .mono{font-family:"SF Mono",ui-monospace,"Cascadia Mono",Menlo,Consolas,monospace}

  /* ---------- top masthead ---------- */
  header.mast{
    background:linear-gradient(180deg,#fffdf8,#f4efe3);
    border-bottom:2px solid var(--ink);
    padding:18px 22px 14px;position:sticky;top:0;z-index:40;
    box-shadow:0 2px 0 var(--brass), 0 6px 18px rgba(26,26,24,.05)}
  .mast-row{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;
    max-width:1080px;margin:0 auto;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:14px}
  .brand-seal{width:46px;height:46px;flex:none;display:grid;place-items:center}
  .brand-seal svg{display:block}
  .brand h1{font-size:21px;line-height:1.05}
  .brand .sub{font-size:11.5px;letter-spacing:.18em;text-transform:uppercase;
    color:var(--muted);margin-top:3px}
  .mode-pill{font-size:11px;letter-spacing:.1em;text-transform:uppercase;
    border:1px solid var(--line);background:var(--paper2);color:var(--muted);
    padding:3px 9px;border-radius:20px}

  /* ---------- tab nav ---------- */
  nav.tabs{max-width:1080px;margin:0 auto;display:flex;gap:2px;
    border-bottom:1px solid var(--line);overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  nav.tabs::-webkit-scrollbar{display:none}
  nav.tabs button{background:none;border:none;padding:11px 16px 9px;
    font-size:14.5px;color:var(--muted);border-bottom:2px solid transparent;
    white-space:nowrap;letter-spacing:.01em;flex:0 0 auto}
  nav.tabs button.active{color:var(--seal);border-bottom-color:var(--seal);font-weight:600}
  nav.tabs button:hover{color:var(--ink)}

  main{max-width:1080px;margin:0 auto;padding:22px;width:100%;box-sizing:border-box}
  .panel{display:none}
  .panel.active{display:block;animation:fade .25s ease}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

  /* ---------- cards / layout ---------- */
  .card{background:var(--paper2);border:1px solid var(--line);border-radius:var(--radius);
    box-shadow:var(--shadow);padding:20px;margin-bottom:18px}
  .card h2{font-size:16px;margin-bottom:2px}
  .card .hint{font-size:13px;color:var(--muted);margin-bottom:16px}
  .eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--brass);
    font-weight:700;margin-bottom:6px}

  .grid{display:grid;gap:13px}
  .g2{grid-template-columns:1fr 1fr}
  .g3{grid-template-columns:1fr 1fr 1fr}
  @media(max-width:680px){.g2,.g3{grid-template-columns:1fr}}

  label.fld{display:block;font-size:12.5px;color:var(--muted);margin-bottom:5px;letter-spacing:.02em}
  label.fld span.req{color:var(--seal)}
  input.in,select.in,textarea.in{width:100%;padding:9px 11px;border:1px solid var(--line);
    border-radius:5px;background:#fff;color:var(--ink);transition:border .15s,box-shadow .15s}
  input.in:focus,select.in:focus,textarea.in:focus{outline:none;border-color:var(--brass);
    box-shadow:0 0 0 3px rgba(154,123,63,.14)}
  textarea.in{resize:vertical;min-height:62px}

  /* ---------- buttons ---------- */
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;border:1px solid var(--ink);
    background:var(--ink);color:#fdf9f0;padding:9px 16px;border-radius:5px;font-size:14px;
    letter-spacing:.02em;transition:transform .06s, background .15s;
    white-space:nowrap;flex-shrink:0;flex-grow:0;width:auto;max-width:100%;line-height:1.2}
  .btn:hover{background:#000}
  .btn:active{transform:translateY(1px)}
  .btn.ghost{background:transparent;color:var(--ink)}
  .btn.ghost:hover{background:#efe9db}
  .btn.seal{background:var(--seal);border-color:var(--seal)}
  .btn.seal:hover{background:var(--seal2)}
  .btn.sm{padding:6px 11px;font-size:13px}
  .btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:4px;align-items:stretch}
  .btn-row > .btn{flex:0 0 auto}
  /* card header: title block shrinks, button keeps full width, wraps on narrow screens */
  .card-head{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
  .card-head > div:first-child{flex:1 1 240px;min-width:0}
  .card-head > button, .card-head > .btn{flex:0 0 auto}
  @media(max-width:520px){
    .card-head > button, .card-head > .btn{width:100%}
  }

  /* ---------- stats ---------- */
  .stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px}
  @media(max-width:760px){.stats{grid-template-columns:repeat(2,minmax(0,1fr))}}
  @media(max-width:380px){.stats{grid-template-columns:1fr}}
  .stat{background:var(--paper2);border:1px solid var(--line);border-radius:var(--radius);
    padding:15px 16px;position:relative;overflow:visible;min-width:0}
  .stat::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--brass);border-radius:var(--radius) 0 0 var(--radius)}
  .stat.green::before{background:var(--green)}
  .stat.seal::before{background:var(--seal)}
  .stat.brass::before{background:var(--brass)}
  .stat .k{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);
    white-space:normal;overflow-wrap:break-word;line-height:1.3}
  .stat .v{font-size:24px;font-weight:600;margin-top:6px;letter-spacing:-.01em}
  .stat .vsub{font-size:12px;color:var(--muted);margin-top:2px}

  /* ---------- tables ---------- */
  .tbl-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:var(--radius);background:var(--paper2)}
  table{width:100%;border-collapse:collapse;font-size:13.5px;min-width:560px}
  thead th{background:#efe9db;text-align:left;padding:10px 12px;font-size:11px;
    letter-spacing:.08em;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--line)}
  tbody td{padding:10px 12px;border-bottom:1px solid var(--line2)}
  tbody tr:last-child td{border-bottom:none}
  tbody tr:hover{background:#fbf8f1}
  td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
  .tag{display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px;
    border:1px solid var(--line);color:var(--muted);background:#fff}
  .tag.active{color:var(--green);border-color:#bcd2c2;background:#f0f6f1}
  .tag.closed{color:var(--muted)}
  .row-act{color:var(--seal);font-size:12.5px;background:none;border:none;padding:2px 6px}
  .row-act:hover{text-decoration:underline}
  .empty{padding:34px;text-align:center;color:var(--muted);font-size:14px}

  /* ---------- toast ---------- */
  #toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);
    background:var(--ink);color:#fdf9f0;padding:11px 20px;border-radius:6px;font-size:14px;
    box-shadow:var(--shadow);opacity:0;pointer-events:none;transition:.25s;z-index:90;max-width:90vw}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  #toast.warn{background:var(--seal)}

  /* ---------- modal ---------- */
  .modal-bg{position:fixed;inset:0;background:rgba(26,26,24,.42);display:none;
    place-items:center;z-index:80;padding:18px}
  .modal-bg.show{display:grid}
  .modal{background:var(--paper2);border-radius:8px;max-width:560px;width:100%;
    max-height:88vh;overflow:auto;box-shadow:0 20px 60px rgba(0,0,0,.3);border:1px solid var(--line)}
  .modal-h{padding:16px 20px;border-bottom:1px solid var(--line);display:flex;
    justify-content:space-between;align-items:center;position:sticky;top:0;background:var(--paper2)}
  .modal-h h3{font-size:17px}
  .modal-b{padding:20px}
  .x{background:none;border:none;font-size:22px;color:var(--muted);line-height:1}
  .x:hover{color:var(--ink)}

  .note{font-size:12.5px;color:var(--muted);background:#fbf6ea;border:1px solid var(--line2);
    border-left:3px solid var(--brass);padding:10px 12px;border-radius:4px;margin-top:12px}

  /* ====== PRINTABLE DOCUMENTS — clean minimal (receipt + invoice) ====== */
  #receiptArea{position:fixed;left:-9999px;top:0}
  .doc{width:720px;background:#fff;color:#222;
    font-family:"Inter","Helvetica Neue",Arial,sans-serif;font-feature-settings:"tnum";}
  .doc-pad{padding:64px 64px 56px}
  .doc *{box-sizing:border-box}

  /* letterhead — name in serif, details in light sans, lots of air */
  .lh{display:flex;justify-content:space-between;align-items:flex-start;gap:30px;padding-bottom:26px}
  .lh-left .nm{font-family:"Iowan Old Style",Palatino,Georgia,serif;font-size:27px;font-weight:600;
    letter-spacing:.005em;color:#1a1a18;line-height:1.12}
  .lh-left .ln{font-size:12px;color:#7a756c;margin-top:5px;letter-spacing:.01em;font-weight:400}
  .lh-right{text-align:right;font-size:11px;color:#9a948a;line-height:1.85;min-width:160px;font-weight:400}
  .lh-seal{display:none}            /* drop the badge for a cleaner header */

  /* hairline under letterhead */
  .lh-rule{height:1px;background:#e8e4dc;margin:0 0 30px}

  /* document title — quiet, wide-tracked, with a thin accent tick */
  .doc-band{display:flex;justify-content:space-between;align-items:baseline;margin:0 0 30px}
  .doc-band .t{font-size:13px;letter-spacing:.34em;text-transform:uppercase;font-weight:600;color:#1a1a18;
    position:relative;padding-left:14px}
  .doc-band .t::before{content:"";position:absolute;left:0;top:50%;transform:translateY(-50%);
    width:5px;height:5px;background:var(--seal);border-radius:50%}
  .doc-band .tag{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:#a89a86;font-weight:500}

  /* meta — label-over-value columns, no boxes */
  .doc-meta{display:flex;gap:40px;flex-wrap:wrap;margin:0 0 36px}
  .doc-meta>div{display:flex;flex-direction:column;gap:3px}
  .doc-meta b{font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:#a8a298;font-weight:600;order:0}
  .doc-meta>div{font-size:14px;color:#2a2620}

  /* ===== RECEIPT ===== */
  .rcpt-body{font-size:15px;line-height:1.9;color:#3a352e;margin:0;font-weight:400;max-width:560px}
  .rcpt-body b{color:#1a1a18;font-weight:600}
  .rcpt-amt{margin-top:40px;display:flex;justify-content:space-between;align-items:baseline;
    border-top:2px solid #1a1a18;padding-top:16px}
  .rcpt-amt .lbl{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:#a8a298;font-weight:600}
  .rcpt-amt .val{font-size:26px;font-weight:600;color:#1a1a18;letter-spacing:.005em;
    font-family:"Iowan Old Style",Palatino,Georgia,serif}
  .rcpt-tds{margin-top:26px;font-size:13px;color:#3a352e;max-width:340px}
  .rcpt-tds>div{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #f0ece2}
  .rcpt-tds>div span:last-child{font-variant-numeric:tabular-nums}
  .rcpt-tds .net{border-bottom:none;border-top:1.5px solid #1a1a18;margin-top:2px;padding-top:8px;font-weight:600;color:#1a1a18}

  /* ===== INVOICE ===== */
  .inv-to{margin:0 0 30px}
  .inv-to .lbl{font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:#a8a298;font-weight:600;display:block;margin-bottom:6px}
  .inv-to b{font-size:15px;color:#1a1a18;font-weight:600}
  .inv-to{font-size:13px;color:#6a655c;line-height:1.6}
  table.inv{width:100%;border-collapse:collapse;font-size:13.5px;margin:0}
  table.inv thead th{background:transparent;text-align:left;padding:0 0 12px;font-size:9.5px;letter-spacing:.12em;
    text-transform:uppercase;font-weight:600;color:#a8a298;border-bottom:1px solid #1a1a18}
  table.inv thead th.r{text-align:right}
  table.inv tbody td{padding:14px 0;border-bottom:1px solid #ede9e1;vertical-align:top;color:#2a2620;line-height:1.5}
  table.inv tbody td.r{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap;color:#1a1a18}
  table.inv tbody td:first-child{color:#b8b2a8;width:30px}
  .inv-tot{margin-top:18px;display:flex;justify-content:flex-end}
  .inv-tot table{border-collapse:collapse;font-size:13.5px;min-width:300px}
  .inv-tot td{padding:7px 0}
  .inv-tot td.lbl{color:#7a756c;padding-right:40px}
  .inv-tot td.r{text-align:right;font-variant-numeric:tabular-nums;color:#1a1a18}
  .inv-tot tr.grand td{border-top:2px solid #1a1a18;padding-top:14px;font-weight:600;font-size:17px;color:#1a1a18;
    font-family:"Iowan Old Style",Palatino,Georgia,serif}
  .inv-words{font-size:12px;color:#9a948a;margin-top:14px;letter-spacing:.01em}
  .inv-pay{margin-top:30px;padding:0;font-size:12px;color:#6a655c;line-height:1.6}
  .inv-pay b{color:#1a1a18;font-weight:600}
  .inv-bank{margin-top:24px;border:1px solid #ede9e1;border-radius:6px;padding:16px 18px;display:flex;gap:20px;align-items:center}
  .inv-bank-t{font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:#a8a298;font-weight:600;margin-bottom:10px}
  .inv-bank-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px 28px}
  .inv-bank-grid>div{display:flex;flex-direction:column;gap:2px}
  .inv-bank-grid span{font-size:10px;color:#a8a298;letter-spacing:.02em}
  .inv-bank-grid b{font-size:12.5px;color:#1a1a18;font-weight:600;font-variant-numeric:tabular-nums}
  .inv-qr{text-align:center;flex:none}
  .inv-qr svg{display:block;border:1px solid #ede9e1;border-radius:4px}
  .inv-qr-c{font-size:9.5px;color:#7a756c;margin-top:5px;letter-spacing:.02em}

  /* shared footer — minimal signature */
  .doc-foot{display:flex;justify-content:flex-end;align-items:flex-end;margin-top:64px}
  .doc-sign{text-align:center;font-size:12px;color:#7a756c}
  .doc-sign .line{border-top:1px solid #c5bfb4;width:200px;margin:0 auto 8px}
  .doc-sign .who{font-weight:600;color:#1a1a18;font-size:13px}
  .doc-stamp{display:none}
  .doc-note{font-size:9.5px;color:#b0a99e;margin-top:48px;border-top:1px solid #ede9e1;padding-top:12px;
    line-height:1.6;font-weight:400}
  .doc-thanks{display:none}

  @media print{
    body *{visibility:hidden}
    #receiptArea,#receiptArea *{visibility:visible}
    #receiptArea{position:absolute;left:0;top:0;width:100%}
    .doc{width:100%}
    .doc-pad{padding:6mm 4mm}
    @page{margin:18mm}
  }
  .foot-note{text-align:center;font-size:12px;color:var(--muted);padding:14px;margin-top:8px}
  .foot-note b{color:var(--seal)}
  /* big centred chamber name on dashboard */
  .chamber-hero{text-align:center;padding:26px 16px 30px;margin-bottom:20px;
    border-bottom:1px solid var(--line);background:linear-gradient(180deg,rgba(255,253,248,.6),transparent)}
  .chamber-hero-logo{margin-bottom:14px}
  .chamber-hero-logo svg{display:inline-block}
  .chamber-hero-name{font-family:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif;
    font-size:clamp(30px,5vw,46px);font-weight:600;color:var(--seal);line-height:1.1;letter-spacing:.01em}
  .chamber-hero-sub{font-size:13px;letter-spacing:.16em;text-transform:uppercase;color:var(--brass);margin-top:10px;font-weight:600}
  /* archive */
  .arch-month{border-top:1px solid var(--line)}
  .arch-month:first-child{border-top:none}
  .arch-mhead{display:flex;justify-content:space-between;align-items:center;padding:11px 4px;cursor:pointer}
  .arch-mhead:hover{background:#faf7f0}
  .arch-caret{color:var(--seal);font-size:11px;display:inline-block;width:14px}
  .arch-detail{padding:4px 4px 14px 22px}
  .arch-sec{margin-top:10px}
  .arch-sec-t{font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:700;margin-bottom:4px}
  table.arch-tbl{width:100%;border-collapse:collapse;font-size:12.5px}
  table.arch-tbl td{padding:5px 8px;border-bottom:1px solid #f0ece2;vertical-align:top}
  table.arch-tbl td.num{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
  table.arch-tbl td.mono{font-family:ui-monospace,Menlo,monospace;font-size:11.5px;color:var(--muted)}

  /* lock screen */
  .lock-overlay{position:fixed;inset:0;z-index:200;background:linear-gradient(160deg,#f4efe3,#ece5d6);
    display:flex;align-items:center;justify-content:center;padding:20px}
  .lock-card{background:var(--paper2);border:1px solid var(--line);border-radius:12px;
    box-shadow:0 12px 48px rgba(26,26,24,.16);padding:34px 30px;width:100%;max-width:380px;text-align:center}
  .lock-card h1{font-size:22px;margin:10px 0 4px}
  .lock-card p{font-size:13.5px;color:var(--muted);margin-bottom:18px;line-height:1.5}
  .lock-seal{width:58px;height:58px;border-radius:50%;border:2px solid var(--seal);color:var(--seal);
    display:grid;place-items:center;font-weight:700;font-size:22px;margin:0 auto;
    box-shadow:inset 0 0 0 3px var(--paper2),inset 0 0 0 4px var(--seal)}
  .lock-card .row-act{display:inline-block;margin-top:6px;color:var(--muted)}
</style>

/* ===========================================================
   Chamber Register — offline book-keeping for an advocate
   Single-file logic. Data lives in this browser (localStorage).
   Sync = export one JSON file into Google Drive / iCloud folder.
   =========================================================== */

const LS_KEY = "chamberRegister.v1";
const ENC_KEY = "chamberRegister.enc.v1";
const ENC_META = "chamberRegister.encmeta.v1";
let _sessionKey = null;
let _locked = false;
const APP_VER = 1;

  docsIn: [],      // inward documents

  counters: { receipt: 0, matter: 0, voucher: 0, invoice: 0 },
  lastBackup: null,
  staffLog: []

let DB = load();

/* ===========================================================

function typesForForum(forum){

}

/* ---------- date / money helpers ---------- */
function fyStartForToday(){
  const d = new Date();
  const y = d.getFullYear();
  const fy = (d.getMonth() >= 3) ? y : y - 1;   // April = month 3
  return `${fy}-04-01`;
}
function fyLabel(fyStartISO){
  const y = +fyStartISO.slice(0,4);
  return `${y}\u2013${(y+1).toString().slice(2)}`;   // 2026–27
}
function inFY(dateISO, fyStartISO){
  if(!dateISO) return false;
  const start = new Date(fyStartISO);
  const end = new Date(start); end.setFullYear(end.getFullYear()+1);
  const d = new Date(dateISO);
  return d >= start && d < end;
}
function todayISO(){ return new Date().toISOString().slice(0,10); }
function fmtINR(n){
  n = Number(n)||0;
  return "\u20B9" + n.toLocaleString("en-IN",{maximumFractionDigits:0});
}
function fmtDate(iso){
  if(!iso) return "\u2014";
  const [y,m,d] = iso.split("-");
  const mon = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][+m-1];
  return `${d} ${mon} ${y}`;
}
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function esc(s){ return (s==null?"":String(s)).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

/* ===========================================================
   ENCRYPTION (WebCrypto: PBKDF2 + AES-GCM)
   The localStorage index is encrypted at rest. The data key is
   wrapped by both the password and a one-time recovery code, so
   either can unlock; losing both = unrecoverable (by design).
   =========================================================== */
const _sessionKeyHolder = true; // (enc state vars hoisted above)

function buf2b64(buf){ return btoa(String.fromCharCode(...new Uint8Array(buf))); }
function b642buf(b64){ const s=atob(b64); const a=new Uint8Array(s.length); for(let i=0;i<s.length;i++)a[i]=s.charCodeAt(i); return a.buffer; }
function randBytes(n){ const a=new Uint8Array(n); crypto.getRandomValues(a); return a; }

async function deriveKEK(passphrase, salt){ // key-encryption-key from a passphrase
  const base = await crypto.subtle.importKey("raw", new TextEncoder().encode(passphrase), "PBKDF2", false, ["deriveKey"]);
  return crypto.subtle.deriveKey(
    {name:"PBKDF2", salt, iterations:210000, hash:"SHA-256"},
    base, {name:"AES-GCM", length:256}, false, ["wrapKey","unwrapKey","encrypt","decrypt"]);
}
function genRecoveryCode(){ // 24 chars, grouped: XXXX-XXXX-XXXX-XXXX-XXXX-XXXX
  const al="ABCDEFGHJKLMNPQRSTUVWXYZ23456789"; const r=randBytes(24);
  let s=""; for(let i=0;i<24;i++){ s+=al[r[i]%al.length]; if(i%4===3&&i<23)s+="-"; } return s;
}

// Create a fresh data key, wrap it with password + recovery code, store meta.
async function encSetup(password){
  const dataKey = await crypto.subtle.generateKey({name:"AES-GCM",length:256}, true, ["encrypt","decrypt"]);
  const recovery = genRecoveryCode();
  const pSalt = randBytes(16), rSalt = randBytes(16);
  const pKEK = await deriveKEK(password, pSalt);
  const rKEK = await deriveKEK(recovery, rSalt);
  const pIv = randBytes(12), rIv = randBytes(12);
  const pWrap = await crypto.subtle.wrapKey("raw", dataKey, pKEK, {name:"AES-GCM", iv:pIv});
  const rWrap = await crypto.subtle.wrapKey("raw", dataKey, rKEK, {name:"AES-GCM", iv:rIv});
  const meta = {
    v:1,
    p:{ salt:buf2b64(pSalt), iv:buf2b64(pIv), wrap:buf2b64(pWrap) },
    r:{ salt:buf2b64(rSalt), iv:buf2b64(rIv), wrap:buf2b64(rWrap) }
  };
  localStorage.setItem(ENC_META, JSON.stringify(meta));
  _sessionKey = dataKey;
  return recovery;
}
function encEnabled(){ return !!localStorage.getItem(ENC_META); }

async function encUnlock(secret, which){ // which: 'p' or 'r'
  const meta = JSON.parse(localStorage.getItem(ENC_META)||"null"); if(!meta) return false;
  const slot = meta[which]; if(!slot) return false;
  try{
    const KEK = await deriveKEK(secret, new Uint8Array(b642buf(slot.salt)));
    const dataKey = await crypto.subtle.unwrapKey("raw", b642buf(slot.wrap), KEK,
      {name:"AES-GCM", iv:new Uint8Array(b642buf(slot.iv))}, {name:"AES-GCM",length:256}, true, ["encrypt","decrypt"]);
    _sessionKey = dataKey; return true;
  }catch(e){ return false; }
}
// Re-wrap the existing data key under a new password (keeps recovery code valid only if re-issued)
async function encChangePassword(newPassword){
  if(!_sessionKey) return null;
  const meta = JSON.parse(localStorage.getItem(ENC_META));
  const pSalt = randBytes(16), pIv = randBytes(12);
  const pKEK = await deriveKEK(newPassword, pSalt);
  const pWrap = await crypto.subtle.wrapKey("raw", _sessionKey, pKEK, {name:"AES-GCM", iv:pIv});
  meta.p = { salt:buf2b64(pSalt), iv:buf2b64(pIv), wrap:buf2b64(pWrap) };
  // also issue a fresh recovery code
  const recovery = genRecoveryCode(); const rSalt=randBytes(16), rIv=randBytes(12);
  const rKEK = await deriveKEK(recovery, rSalt);
  const rWrap = await crypto.subtle.wrapKey("raw", _sessionKey, rKEK, {name:"AES-GCM", iv:rIv});
  meta.r = { salt:buf2b64(rSalt), iv:buf2b64(rIv), wrap:buf2b64(rWrap) };
  localStorage.setItem(ENC_META, JSON.stringify(meta));
  return recovery;
}
async function encryptDB(){
  if(!_sessionKey) return null;
  const iv = randBytes(12);
  const plain = new TextEncoder().encode(JSON.stringify(DB));
  const ct = await crypto.subtle.encrypt({name:"AES-GCM", iv}, _sessionKey, plain);
  return JSON.stringify({iv:buf2b64(iv), ct:buf2b64(ct)});
}
async function decryptBlob(blob){
  const o = JSON.parse(blob);
  const pt = await crypto.subtle.decrypt({name:"AES-GCM", iv:new Uint8Array(b642buf(o.iv))}, _sessionKey, b642buf(o.ct));
  return JSON.parse(new TextDecoder().decode(pt));
}

/* ---------- persistence ---------- */
function load(){
  // when encryption is enabled, the real data load happens after unlock (loadDecrypted)
  if(encEnabled()){ _locked = true; return DEFAULTS(); }
  try{
    const raw = localStorage.getItem(LS_KEY);
    if(!raw) return DEFAULTS();
    return migrate(JSON.parse(raw));
  }catch(e){ console.warn("load failed",e); return DEFAULTS(); }
}
async function loadDecrypted(){
  const blob = localStorage.getItem(ENC_KEY);
  if(!blob){ DB = DEFAULTS(); _locked=false; return; }
  try{ DB = migrate(await decryptBlob(blob)); _locked=false; }
  catch(e){ throw new Error("decrypt failed"); }
}

/* ---------- encryption setup / change UI ---------- */
function openSetPw(){

    <div id="spwMsg" style="color:var(--seal);font-size:13px;margin-top:8px;min-height:16px"></div>

}
async function doSetPw(){

  const blob = await encryptDB();
  localStorage.setItem(ENC_KEY, blob); localStorage.removeItem(LS_KEY);

}
function openChangePw(){
  openModal("Change master password", `
    <div class="hint" style="margin-bottom:12px">Set a new password. A fresh recovery code will be issued — your old recovery code stops working.</div>
    <label class="fld">New master password</label>
    <input class="in" type="password" id="cpw1" placeholder="At least 8 characters">
    <label class="fld" style="margin-top:10px">Confirm password</label>

}
async function doChangePw(){
  const a=document.getElementById("cpw1").value, b=document.getElementById("cpw2").value;
  const msg=document.getElementById("cpwMsg");
  if(a.length<8){ msg.textContent="Use at least 8 characters."; return; }

}
function showRecoveryCode(code, firstTime){
  openModal("Your recovery code", `
    <div class="hint" style="margin-bottom:10px">${firstTime?"Encryption is now ON.":"Password updated."} Write this recovery code down and keep it somewhere safe (not on this device). It is the <b>only</b> way back in if you forget your password.</div>
    <div class="mono" style="font-size:18px;letter-spacing:.04em;background:#faf7f0;border:1px solid var(--seal);border-radius:6px;padding:14px;text-align:center;user-select:all">${esc(code)}</div>
    <div class="btn-row" style="margin-top:14px">
      <button class="btn ghost" onclick="copyText('${esc(code)}')">Copy code</button>
      <button class="btn seal" onclick="closeModal();renderAll()">I've saved it</button>
    </div>`);
}
function copyText(t){ try{ navigator.clipboard.writeText(t); toast("Copied."); }catch(e){ toast("Copy failed — write it down.",true); } }
function lockNow(){
  _sessionKey=null; _locked=true;
  showLockScreen();
}
const SCHEMA_VERSION = 3;  // bump when the data shape changes; migrate handles upgrades
function migrate(data){
  // Forward-compatible: merges in any NEW default fields without dropping
  // existing data, preserves unknown keys, and never throws on partial data.
  if(!data || typeof data!=="object") data = {};
  const base = DEFAULTS();
  // settings: keep all existing values, add any newly-introduced defaults
  data.settings = Object.assign({}, base.settings, data.settings||{});
  // core arrays: ensure present
  for(const k of ["matters","receipts","expenses","cash","docsIn","docsFiled","invoices"]) if(!Array.isArray(data[k])) data[k]=[];
  data.counters = Object.assign({}, base.counters, data.counters||{});
  // back-fill voucher counter from existing vouchers if missing
  if(!data.counters.voucher){
    let mx=0; data.expenses.forEach(e=>{ const m=/V-\d{2}-(\d{3})/.exec(e.voucherNo||""); if(m) mx=Math.max(mx,+m[1]); });
    data.counters.voucher = mx;
  }
  // back-fill invoice counter likewise
  if(!data.counters.invoice){
    let mx=0; (data.invoices||[]).forEach(v=>{ const m=/\/(\d{3})$/.exec(v.no||""); if(m) mx=Math.max(mx,+m[1]); });
    data.counters.invoice = mx;
  }
  // migrate any legacy inline proof -> IndexedDB, keep only meta in index
  data.expenses.forEach(e=>{
    if(e.proof && e.proof.data){
      const pid = e.id;
      try{ idbPut("proof:"+pid, e.proof.data); }catch(_){}
      e.proofMeta = {name:e.proof.name, type:e.proof.type};
      delete e.proof;
    }
  });
  if(!Array.isArray(data.staffLog)) data.staffLog = [];
  data.ver = APP_VER;
  data.schema = SCHEMA_VERSION;
  return data;
}
function save(){
  if(encEnabled() && _sessionKey){
    // write encrypted blob; remove any plaintext index
    encryptDB().then(blob=>{ if(blob){ localStorage.setItem(ENC_KEY, blob); localStorage.removeItem(LS_KEY); } })
      .catch(()=>toast("Could not save (encryption error).", true));
    return;
  }
  try{ localStorage.setItem(LS_KEY, JSON.stringify(DB)); }
  catch(e){ toast("Could not save the index. Export a backup now.", true); }
}

/* ===========================================================
   PROOF STORE — IndexedDB (uses your actual disk, no 5MB cap)
   Only the small JSON index lives in localStorage; the heavy
   PDF/image bytes live here, keyed by proof id.
   =========================================================== */
const IDB_NAME = "chamberProofs", IDB_STORE = "proofs";
let _idb = null;
function idbOpen(){
  return new Promise((res,rej)=>{
    if(_idb) return res(_idb);
    const req = indexedDB.open(IDB_NAME, 1);
    req.onupgradeneeded = ()=>{ const db=req.result; if(!db.objectStoreNames.contains(IDB_STORE)) db.createObjectStore(IDB_STORE); };
    req.onsuccess = ()=>{ _idb=req.result; res(_idb); };
    req.onerror = ()=>rej(req.error);
  });
}
async function idbPut(key, value){
  const db = await idbOpen();
  return new Promise((res,rej)=>{
    const tx = db.transaction(IDB_STORE,"readwrite");
    tx.objectStore(IDB_STORE).put(value, key);
    tx.oncomplete = ()=>res(true); tx.onerror = ()=>rej(tx.error);
  });
}
async function idbGet(key){
  const db = await idbOpen();
  return new Promise((res,rej)=>{
    const tx = db.transaction(IDB_STORE,"readonly");
    const r = tx.objectStore(IDB_STORE).get(key);
    r.onsuccess = ()=>res(r.result||null); r.onerror = ()=>rej(r.error);
  });
}
async function idbDel(key){
  const db = await idbOpen();
  return new Promise((res,rej)=>{
    const tx = db.transaction(IDB_STORE,"readwrite");
    tx.objectStore(IDB_STORE).delete(key);
    tx.oncomplete = ()=>res(true); tx.onerror = ()=>rej(tx.error);
  });
}

async function gatherProofs(){
  const out = {};
  for(const e of DB.expenses){
    if(e.proofMeta){ try{ const d = await idbGet("proof:"+e.id); if(d) out[e.id] = d; }catch(_){} }
  }
  return out;
}
async function gatherDocFiles(){
  const out = {};
  for(const grp of [DB.docsIn, DB.docsFiled]){
    for(const x of (grp||[])){ for(const f of (x.files||[])){ try{ const d=await idbGet(f.key); if(d) out[f.key]=d; }catch(_){} } }
  }
  return out;
}
async function exportData(filenameOverride){
  const proofs = await gatherProofs();
  const docfiles = await gatherDocFiles();
  const bundle = Object.assign({}, DB, {_proofs: proofs, _docfiles: docfiles, _bundleVer: 2});
  const payload = JSON.stringify(bundle, null, 2);
  const blob = new Blob([payload], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  const name = filenameOverride || `ChamberRegister-${todayISO()}.json`;
  a.href = url; a.download = name;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url), 1500);
  DB.lastBackup = new Date().toISOString();
  save();
}

function autoBackupIfDue(){
  if(!DB.settings.autoBackup) return;

  const stamp = todayISO();
  if(last === stamp) return;
  if(DB.receipts.length + DB.expenses.length + DB.matters.length === 0) return;
  exportData(`ChamberRegister-backup-${stamp}.json`);
  sessionStorage.setItem("cr_autobackup_today", stamp);

}
function importData(file){
  const reader = new FileReader();
  reader.onload = async () => {
    try{
      const data = JSON.parse(reader.result);
      if(!data || typeof data!=="object" || (!("settings" in data) && !("receipts" in data)))
        throw new Error("Not a Chamber Register file");
      const proofs = data._proofs || {};
      const docfiles = data._docfiles || {};
      delete data._proofs; delete data._docfiles; delete data._bundleVer;
      DB = migrate(data);
      save();
      for(const [id, blobData] of Object.entries(proofs)){ try{ await idbPut("proof:"+id, blobData); }catch(_){} }
      for(const [key, blobData] of Object.entries(docfiles)){ try{ await idbPut(key, blobData); }catch(_){} }
      renderAll();
      toast("Data, attachments and documents restored.");
      closeModal();
    }catch(e){ toast("That file could not be read.", true); }
  };
  reader.readAsText(file);
}

function newRegimeTax(income){
  // FY 2025-26 new regime slabs + 87A rebate (nil up to 12L taxable).
  // Slabs: 0-4L nil, 4-8L 5%, 8-12L 10%, 12-16L 15%, 16-20L 20%, 20-24L 25%, >24L 30%.
  if(income<=1200000) return 0; // rebate makes it nil
  let t=0;
  const sl=[[400000,0],[800000,0.05],[1200000,0.10],[1600000,0.15],[2000000,0.20],[2400000,0.25],[Infinity,0.30]];
  let prev=0;
  for(const [cap,rate] of sl){ if(income>prev){ t+=(Math.min(income,cap)-prev)*rate; prev=cap; } else break; }
  return Math.round(t*1.04); // + 4% cess
}
function taxSnapshot(declared){
  const tds = tdsFY();
  const tax = newRegimeTax(declared);
  const balance = tax - tds;     // positive = payable, negative = refund
  const safe = declared <= 1200000;
  let line2;
  if(tax===0){
    line2 = tds>0
      ? `<div style="font-size:14px;margin-top:8px">Estimated tax: <b>\u20B90</b> (within \u20B912L rebate). TDS of <b>${fmtINR(tds)}</b> already deducted is <b>refundable</b> on filing.</div>`
      : "";
  } else {
    line2 = `<div style="font-size:14px;margin-top:8px;display:flex;gap:18px;flex-wrap:wrap">
      <span>Estimated tax: <b>${fmtINR(tax)}</b></span>
      <span>Less TDS credit: <b>${fmtINR(tds)}</b></span>
      <span>${balance>=0?`Balance payable: <b style="color:var(--seal)">${fmtINR(balance)}</b>`:`Refund due: <b style="color:var(--green)">${fmtINR(-balance)}</b>`}</span>
    </div>`;
  }
  return `<div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap">
      <div style="font-size:15px">Declared income this FY: <b>${fmtINR(declared)}</b></div>
      <span class="tag ${safe?'active':'closed'}">${safe?'Within \u20B912L rebate \u2014 indicatively nil tax':'Above \u20B912L \u2014 tax likely'}</span>
    </div>
    ${line2}
    <div class="hint" style="margin-top:10px;margin-bottom:0">TDS credit is the tax already withheld by clients against your PAN (visible in Form 26AS / AIS). It is set off against your tax — and refunded if it exceeds your liability. Figures indicative; confirm with your CA.</div>`;
}

function onInvStyleChange(){
  const style=document.getElementById("ivStyle").value;
  const addBtn=document.getElementById("ivAddLine");
  // consolidated: single locked-ish line; itemised: multiple
  if(style==="consolidated"){
    if(_invLines.length>1) _invLines=[{desc:"Professional fees", amount:_invLines.reduce((s,l)=>s+(+l.amount||0),0)||""}];
    if(_invLines.length===0) _invLines=[{desc:"Professional fees",amount:""}];
    addBtn.style.display="none";
  }else{
    addBtn.style.display="inline-flex";
  }
  drawInvLines(); recalcInvTotal();
}
function drawInvLines(){
  const wrap=document.getElementById("ivLines"); if(!wrap) return;
  wrap.innerHTML=_invLines.map((l,i)=>`<div class="grid" style="grid-template-columns:1fr 150px 36px;gap:8px;margin-bottom:7px">
    <input class="in" placeholder="Description of work" value="${esc(l.desc)}" oninput="updInvLine(${i},'desc',this.value)">
    <input class="in" type="number" min="0" placeholder="Amount" value="${esc(l.amount)}" oninput="updInvLine(${i},'amount',this.value)">
    ${_invLines.length>1?`<button class="btn ghost sm" onclick="rmInvLine(${i})" style="padding:6px">✕</button>`:"<div></div>"}
  </div>`).join("");
}
function drawInvExpenses(){
  const wrap=document.getElementById("ivExpenses"); if(!wrap) return;
  wrap.innerHTML=_invExpenses.map((l,i)=>`<div class="grid" style="grid-template-columns:1fr 150px 36px;gap:8px;margin-bottom:7px">
    <input class="in" placeholder="e.g. court fees, travel, printing" value="${esc(l.desc)}" oninput="updInvExp(${i},'desc',this.value)">
    <input class="in" type="number" min="0" placeholder="Amount" value="${esc(l.amount)}" oninput="updInvExp(${i},'amount',this.value)">
    <button class="btn ghost sm" onclick="rmInvExp(${i})" style="padding:6px">✕</button>
  </div>`).join("");
}
function addInvLine(){ _invLines.push({desc:"",amount:""}); drawInvLines(); }
function rmInvLine(i){ _invLines.splice(i,1); if(!_invLines.length)_invLines=[{desc:"",amount:""}]; drawInvLines(); recalcInvTotal(); }
function updInvLine(i,k,v){ _invLines[i][k]=v; if(k==="amount")recalcInvTotal(); }
function addInvExpense(){ _invExpenses.push({desc:"",amount:""}); drawInvExpenses(); }
function rmInvExp(i){ _invExpenses.splice(i,1); drawInvExpenses(); recalcInvTotal(); }
function updInvExp(i,k,v){ _invExpenses[i][k]=v; if(k==="amount")recalcInvTotal(); }
function recalcInvTotal(){
  const fees=_invLines.reduce((s,l)=>s+(+l.amount||0),0);
  const exp=_invExpenses.reduce((s,l)=>s+(+l.amount||0),0);
  const note=document.getElementById("ivTotalNote");
  if(note) note.innerHTML=`Fees ${fmtINR(fees)}${exp?` + Expenses ${fmtINR(exp)}`:""} &nbsp;=&nbsp; <b>Total ${fmtINR(fees+exp)}</b>`;
}
function saveAndPrintInvoice(){
  const matterId=document.getElementById("ivMatter").value;
  const date=document.getElementById("ivDate").value;
  if(!matterId){ toast("Select a matter.",true); return; }
  if(!date){ toast("Pick a date.",true); return; }
  const lines=_invLines.filter(l=>l.desc.trim()||(+l.amount>0)).map(l=>({desc:l.desc.trim()||"Professional fees",amount:+l.amount||0}));
  const expenses=_invExpenses.filter(l=>l.desc.trim()||(+l.amount>0)).map(l=>({desc:l.desc.trim(),amount:+l.amount||0}));
  if(!lines.length || lines.reduce((s,l)=>s+l.amount,0)<=0){ toast("Enter at least one fee amount.",true); return; }
  const dueMode=document.getElementById("ivDueMode").value;
  const dueDays=+document.getElementById("ivDueDays").value||0;
  const inv={ id:uid(), no:nextInvoiceNo(), date, matterId,
    style:document.getElementById("ivStyle").value, dueMode, due:dueDays,
    lines, expenses, notes:document.getElementById("ivNotes").value.trim(), status:"raised" };
  DB.invoices.push(inv);
  save();
  printInvoice(inv);
  _invLines=[{desc:"Professional fees",amount:""}]; _invExpenses=[];
  renderAll(); go("invoice");
  toast(`Invoice ${inv.no} saved.`);
}
function onDueModeChange(){
  const mode=document.getElementById("ivDueMode").value;
  document.getElementById("ivDueDays").style.display = mode==="days" ? "block" : "none";
}
function reprintInvoice(id){ const inv=DB.invoices.find(x=>x.id===id); if(inv) printInvoice(inv); }
function delInvoice(id){ DB.invoices=DB.invoices.filter(x=>x.id!==id); save(); renderInvoice(); toast("Invoice deleted."); }

function printInvoice(inv){
  const s=DB.settings; const m=matterById(inv.matterId)||{};
  const fees=(inv.lines||[]).reduce((sm,l)=>sm+(+l.amount||0),0);
  const exp=(inv.expenses||[]).reduce((sm,l)=>sm+(+l.amount||0),0);
  const grand=fees+exp;
  let rows="";
  if(inv.style==="itemised"){
    (inv.lines||[]).forEach((l,i)=>{ rows+=`<tr><td>${i+1}</td><td>${esc(l.desc)}</td><td class="r">${fmtINR(l.amount)}</td></tr>`; });
  }else{
    const desc = inv.notes || "Professional fees for legal services rendered in the matter";
    rows += `<tr><td>1</td><td>${esc(desc)}</td><td class="r">${fmtINR(fees)}</td></tr>`;
  }
  (inv.expenses||[]).forEach((l,i)=>{ rows+=`<tr><td>${(inv.style==="itemised"?(inv.lines.length+i+1):(i+2))}</td><td>${esc(l.desc)} <span style="color:#8a8175">(expense)</span></td><td class="r">${fmtINR(l.amount)}</td></tr>`; });

  let dueText="";
  if(inv.dueMode==="days" || (inv.dueMode===undefined && inv.due)) dueText = `Payable within ${inv.due} day(s) of receipt.`;
  else if(inv.dueMode==="onreceipt") dueText = "Payable on receipt.";
  // "none" -> no line at all
  const payBlock = dueText
    ? `<div class="inv-pay">${dueText}${s.contact?` Kindly remit to the chamber. For queries: ${esc(s.contact)}.`:""}</div>`
    : (s.contact?`<div class="inv-pay">Kindly remit to the chamber. For queries: ${esc(s.contact)}.</div>`:"");
  // bank details block (only if any field filled)
  const hasBank = s.bankName||s.bankAcc||s.bankIfsc||s.bankBranch||s.bankUpi;
  let qrSvg="";
  if(s.bankShowQr && s.bankUpi){
    const payee=encodeURIComponent(s.bankName||s.advName||"");
    const amt=encodeURIComponent(grand.toFixed(2));
    const note=encodeURIComponent("Invoice "+(inv.no||""));
    const upiStr=`upi://pay?pa=${encodeURIComponent(s.bankUpi)}&pn=${payee}&am=${amt}&cu=INR&tn=${note}`;
    try{ qrSvg = QR.svg(upiStr, 132); }catch(e){ qrSvg=""; }
  }
  const bankBlock = hasBank ? `<div class="inv-bank">
      <div style="flex:1">
        <div class="inv-bank-t">Bank details for remittance</div>
        <div class="inv-bank-grid">
          ${s.bankName?`<div><span>Account name</span><b>${esc(s.bankName)}</b></div>`:""}
          ${s.bankBranch?`<div><span>Bank &amp; branch</span><b>${esc(s.bankBranch)}</b></div>`:""}
          ${s.bankAcc?`<div><span>Account no.</span><b>${esc(s.bankAcc)}</b></div>`:""}
          ${s.bankIfsc?`<div><span>IFSC</span><b>${esc(s.bankIfsc)}</b></div>`:""}
          ${s.bankUpi?`<div><span>UPI</span><b>${esc(s.bankUpi)}</b></div>`:""}
        </div>
      </div>
      ${qrSvg?`<div class="inv-qr">${qrSvg}<div class="inv-qr-c">Scan to pay ${fmtINR(grand)}</div></div>`:""}
    </div>` : "";
  document.getElementById("receiptArea").innerHTML=`
   <div class="doc"><div class="doc-pad">
     ${docLetterhead(s)}
     <div class="doc-band"><div class="t">Invoice</div><div class="tag">Memo of Fees</div></div>
     <div class="doc-meta">
       <div><b>Invoice No.</b> ${esc(inv.no)}</div>
       <div><b>Date</b> ${fmtDate(inv.date)}</div>
       ${caseMetaBits(m)}
     </div>
     <div class="inv-to"><span class="lbl">To</span><br>
       <b>${esc(m.client||"")}</b>${m.parties?`<br>${esc(m.parties)}`:""}
     </div>
     <table class="inv">
       <thead><tr><th style="width:34px">#</th><th>Particulars</th><th class="r" style="width:130px">Amount (₹)</th></tr></thead>
       <tbody>${rows}</tbody>
     </table>
     <div class="inv-tot"><table>
       <tr><td class="lbl">Professional fees</td><td class="r">${fmtINR(fees)}</td></tr>
       ${exp?`<tr><td class="lbl">Expenses</td><td class="r">${fmtINR(exp)}</td></tr>`:""}
       <tr class="grand"><td class="lbl">Total payable</td><td class="r">${fmtINR(grand)}</td></tr>
     </table></div>
     <div class="inv-words">Rupees ${esc(numToWords(grand))} only.</div>
     ${inv.notes&&inv.style==="itemised"?`<div style="font-size:12.5px;margin-top:10px;color:#3a352e">${esc(inv.notes)}</div>`:""}
     ${payBlock}
     ${bankBlock}
     <div class="doc-foot">
       <div></div>
       <div class="doc-sign"><div class="line"></div><div class="who">${esc(s.advName)}</div>Advocate</div>
     </div>
     <div class="doc-note">${esc(s.rcmNote)} This is a memo of fees / bill of costs and not a receipt; a separate receipt will be issued on payment.</div>
   </div></div>`;
  setTimeout(()=>window.print(),120);
}

      for (var x = 0; x < width; x += 1) {
        gif.setPixel(x, y, getPixel(x, y) );
      }
    }

    var b = byteArrayOutputStream();
    gif.write(b);

    var base64 = base64EncodeOutputStream();
    var bytes = b.toByteArray();
    for (var i = 0; i < bytes.length; i += 1) {
      base64.writeByte(bytes[i]);
    }
    base64.flush();

    return 'data:image/gif;base64,' + base64;
  };

  //---------------------------------------------------------------------
  // returns qrcode function.

  return qrcode;
}();

// multibyte support
!function() {

  qrcode.stringToBytesFuncs['UTF-8'] = function(s) {
    // http://stackoverflow.com/questions/18729405/how-to-convert-utf8-string-to-byte-array
    function toUTF8Array(str) {
      var utf8 = [];
      for (var i=0; i < str.length; i++) {
        var charcode = str.charCodeAt(i);
        if (charcode < 0x80) utf8.push(charcode);
        else if (charcode < 0x800) {
          utf8.push(0xc0 | (charcode >> 6),
              0x80 | (charcode & 0x3f));
        }
        else if (charcode < 0xd800 || charcode >= 0xe000) {
          utf8.push(0xe0 | (charcode >> 12),
              0x80 | ((charcode>>6) & 0x3f),
              0x80 | (charcode & 0x3f));
        }
        // surrogate pair
        else {
          i++;
          // UTF-16 encodes 0x10000-0x10FFFF by
          // subtracting 0x10000 and splitting the
          // 20 bits of 0x0-0xFFFFF into two halves
          charcode = 0x10000 + (((charcode & 0x3ff)<<10)
            | (str.charCodeAt(i) & 0x3ff));
          utf8.push(0xf0 | (charcode >>18),
              0x80 | ((charcode>>12) & 0x3f),
              0x80 | ((charcode>>6) & 0x3f),
              0x80 | (charcode & 0x3f));
        }
      }
      return utf8;
    }
    return toUTF8Array(s);
  };

}();

/* QR.svg wrapper for inline use (UPI payloads) */
var QR = (function(){
  function svg(text, px){
    try{
      var qr = qrcode(0, 'M');
      qr.addData(text);
      qr.make();
      var n = qr.getModuleCount();
      var rects = "";
      for(var r=0;r<n;r++)for(var c=0;c<n;c++){ if(qr.isDark(r,c)) rects += '<rect x="'+c+'" y="'+r+'" width="1" height="1"/>'; }
      var dim = n+8;
      return '<svg xmlns="http://www.w3.org/2000/svg" viewBox="-4 -4 '+dim+' '+dim+'" width="'+(px||140)+'" height="'+(px||140)+'"><rect x="-4" y="-4" width="'+dim+'" height="'+dim+'" fill="#fff"/><g fill="#1a1a18">'+rects+'</g></svg>';
    }catch(e){ return ""; }
  }
  return { svg: svg };
})();


function numToWords(n){
  n = Math.round(Number(n)||0);
  if(n===0) return "Zero";
  const a=["","One","Two","Three","Four","Five","Six","Seven","Eight","Nine","Ten","Eleven","Twelve","Thirteen","Fourteen","Fifteen","Sixteen","Seventeen","Eighteen","Nineteen"];
  const b=["","","Twenty","Thirty","Forty","Fifty","Sixty","Seventy","Eighty","Ninety"];
  const two=x=> x<20? a[x] : b[Math.floor(x/10)]+(x%10?" "+a[x%10]:"");
  const three=x=> { const h=Math.floor(x/100), r=x%100; return (h? a[h]+" Hundred"+(r?" ":""):"")+(r?two(r):""); };
  let out="", crore=Math.floor(n/10000000); n%=10000000;
  let lakh=Math.floor(n/100000); n%=100000;
  let thou=Math.floor(n/1000); n%=1000;
  let hund=n;
  if(crore) out+=two(crore)+" Crore ";
  if(lakh) out+=two(lakh)+" Lakh ";
  if(thou) out+=two(thou)+" Thousand ";
  if(hund) out+=three(hund);
  return out.trim().replace(/\s+/g," ");
}

function voidReceipt(id){

   =========================================================== */
function cashRows(){
  const fromRec = DB.receipts.map(r=>({date:r.date, particulars:`Receipt ${r.no} — ${matterLabel(r.matterId)}`, type:"in", amount:+r.amount||0, mode:r.mode, ref:r.no, src:"receipt"}));
  const fromExp = DB.expenses.map(e=>({date:e.date, particulars:`${e.head}${e.payee?" — "+e.payee:""}`, type:"out", amount:+e.amount||0, mode:e.mode, ref:e.voucherNo||"", src:"expense"}));
  const manual = DB.cash.filter(c=>!c.ref || (!DB.receipts.some(r=>r.no===c.ref))).map(c=>({...c, src:"manual"}));
  // use auto rows for receipts/expenses; manual only for ad-hoc
  return [...fromRec, ...fromExp, ...DB.cash.filter(c=>c.src==="manual")]
    .concat(DB.cash.filter(c=>c.manual))  // safety
    .filter((v,i,arr)=>true)
    .sort((a,b)=>(a.date||"").localeCompare(b.date||""));
}
function renderCash(){
  // Build clean: receipts (in) + expenses (out) + explicit manual entries
  const rows = [];
  DB.receipts.forEach(r=>rows.push({date:r.date, p:`Receipt ${r.no} — ${matterLabel(r.matterId)}`, t:"in", a:+r.amount||0, mode:r.mode}));
  DB.expenses.forEach(e=>rows.push({date:e.date, p:`${e.head}${e.payee?" — "+e.payee:""}`, t:"out", a:+e.amount||0, mode:e.mode}));
  DB.cash.filter(c=>c.manual).forEach(c=>rows.push({date:c.date, p:c.particulars, t:c.type, a:+c.amount||0, mode:c.mode}));
  rows.sort((a,b)=>(a.date||"").localeCompare(b.date||""));
  let bal=0;
  const body = rows.map(r=>{
    bal += r.t==="in"? r.a : -r.a;
    return `<tr>
      <td>${fmtDate(r.date)}</td><td>${esc(r.p)}</td><td>${esc(r.mode||"")}</td>
      <td class="num">${r.t==="in"?fmtINR(r.a):""}</td>
      <td class="num">${r.t==="out"?fmtINR(r.a):""}</td>
      <td class="num" style="font-weight:600">${fmtINR(bal)}</td></tr>`;
  }).join("");
  const totIn = rows.filter(r=>r.t==="in").reduce((s,r)=>s+r.a,0);
  const totOut = rows.filter(r=>r.t==="out").reduce((s,r)=>s+r.a,0);
  document.getElementById("panel-cash").innerHTML = `
    <div class="card">
      <div class="card-head">
        <div><h2>Cash book</h2><div class="hint">Auto-built from receipts (in) and expenses (out). Add manual entries for anything else. This is your Rule 6F cash record.</div></div>
        <button class="btn ghost sm" onclick="addCash()">+ Manual entry</button>
      </div>
      ${rows.length? `<div class="tbl-wrap"><table>
        <thead><tr><th>Date</th><th>Particulars</th><th>Mode</th><th class="num">Receipts</th><th class="num">Payments</th><th class="num">Balance</th></tr></thead>
        <tbody>${body}</tbody>
        <tfoot><tr style="font-weight:700;background:#efe9db">
          <td colspan="3">Totals</td><td class="num">${fmtINR(totIn)}</td>
          <td class="num">${fmtINR(totOut)}</td><td class="num">${fmtINR(totIn-totOut)}</td></tr></tfoot>
        </table></div>`
        : `<div class="empty">No entries yet.</div>`}
    </div>`;
}

/* ---- proof handling: compress images, hold in staging until save ---- */
let _proofStaging = null;
function onProofPicked(input){
  const f = input.files && input.files[0];
  const info = document.getElementById("exFileInfo");
  _proofStaging = null;
  if(!f){ info.textContent=""; return; }
  if(f.type === "application/pdf"){
    const r = new FileReader();
    r.onload = ()=>{ _proofStaging = {name:f.name, type:f.type, data:r.result};
      info.textContent = `Attached: ${f.name} (${(f.size/1024).toFixed(0)} KB)`; };
    r.readAsDataURL(f);
  } else if(f.type.startsWith("image/")){
    const r = new FileReader();
    r.onload = ()=>{
      const img = new Image();
      img.onload = ()=>{
        const maxDim = 1600; let {width:w, height:h} = img;
        if(w>maxDim || h>maxDim){ const s = maxDim/Math.max(w,h); w=Math.round(w*s); h=Math.round(h*s); }
        const c = document.createElement("canvas"); c.width=w; c.height=h;
        c.getContext("2d").drawImage(img,0,0,w,h);
        const out = c.toDataURL("image/jpeg", 0.8);
        _proofStaging = {name:f.name.replace(/\.\w+$/,"")+".jpg", type:"image/jpeg", data:out};
        info.textContent = `Attached: ${_proofStaging.name} (~${Math.round((out.length*0.75)/1024)} KB)`;
      };
      img.src = r.result;
    };
    r.readAsDataURL(f);
  } else { info.innerHTML = `<span style="color:var(--seal)">Only images or PDF allowed.</span>`; input.value=""; }
}
async function viewProof(id){

async function saveExpense(){

async function decryptHandover(text){
  // Expects {_enc:"ASDS-handover", salt, iv, ct}; uses settings.handoverKey
  const o=JSON.parse(text);
  if(o._enc!=="ASDS-handover") throw new Error("not encrypted handover");
  const key = DB.settings && DB.settings.handoverKey;
  if(!key) throw new Error("no handover key set");
  const b2a=b64=>{const s=atob(b64);const a=new Uint8Array(s.length);for(let i=0;i<s.length;i++)a[i]=s.charCodeAt(i);return a;};
  const base=await crypto.subtle.importKey("raw", new TextEncoder().encode(key), "PBKDF2", false, ["deriveKey"]);
  const dk=await crypto.subtle.deriveKey({name:"PBKDF2", salt:b2a(o.salt), iterations:150000, hash:"SHA-256"}, base, {name:"AES-GCM", length:256}, false, ["decrypt"]);
  const pt=await crypto.subtle.decrypt({name:"AES-GCM", iv:b2a(o.iv)}, dk, b2a(o.ct));
  return new TextDecoder().decode(pt);
}
function loadStaffFile(file){
  const r = new FileReader();
  r.onload = async () => {
    try{
      let text = r.result;
      // If it's an encrypted handover, decrypt first.
      let looksEncrypted=false;
      try{ const probe=JSON.parse(text); looksEncrypted = probe && probe._enc==="ASDS-handover"; }catch(_){}
      if(looksEncrypted){
        try{ text = await decryptHandover(text); }
        catch(e){ toast(e.message==="no handover key set" ? "Set the handover key in Settings first." : "Couldn't decrypt — handover key may not match.", true); return; }
      }
      const b = JSON.parse(text);
      if(b._type !== "chamberEntryBatch") throw new Error("not a handover file");
      _pendingBatch = b;
      renderBatchReview();
    }catch(e){ toast("That isn't a valid handover file.", true); }
  };
  r.readAsText(file);
}

async function confirmBatch(){
  const b = _pendingBatch; if(!b){ return; }
  let nr=0, ne=0;
  // receipts -> create/match a matter, then a numbered receipt
  for(const x of (b.receipts||[])){
    // find an existing matter by client+caseNo, else create one
    let m = DB.matters.find(mm => mm.client===x.client && (mm.caseNo||"")===(x.caseNo||""));
    if(!m){
      const code = nextMatterCode();
      m = {id:uid(), code, opened:todayISO(), client:x.client, parties:x.parties||"",
        court:x.forum||"", matterType:"", caseNo:x.caseNo||"", diaryNo:"", contact:"", email:"",
        refName:"", refContact:"", notes:"", status:"Active", enteredBy:x.enteredBy};
      DB.matters.push(m);
    }
    const no = nextReceiptNo();
    DB.receipts.push({id:uid(), no, date:x.date, matterId:m.id, amount:+x.amount||0,
      mode:x.mode||"", towards:x.towards||"Professional fees", remarks:x.remarks||"",
      enteredBy:x.enteredBy, enteredAt:x.enteredAt});
    nr++;
  }
  // expenses -> numbered voucher, restore proof to IndexedDB
  for(const x of (b.expenses||[])){
    const id=uid(); const voucherNo=nextVoucherNo();
    const exp={id, voucherNo, date:x.date, head:x.head, miscDetail:x.miscDetail||"",
      payee:x.payee||"", amount:+x.amount||0, mode:x.mode||"", remarks:x.remarks||"",
      enteredBy:x.enteredBy, enteredAt:x.enteredAt};
    if(x.proofMeta && b._proofs && b._proofs[x.id]){
      try{ await idbPut("proof:"+id, b._proofs[x.id]); exp.proofMeta=x.proofMeta; }catch(e){}
    }
    DB.expenses.push(exp);
    ne++;
  }
  // documents (inward + filed) -> restore files, auto-link to matter when possible
  let nd=0;
  async function importDocs(srcArr, destKey){
    for(const x of (srcArr||[])){
      const newId=uid(); const newFiles=[];
      for(let i=0;i<(x.files||[]).length;i++){
        const oldKey=x.files[i].key; const nk="doc:"+newId+":"+i;
        const blob = b._docfiles && b._docfiles[oldKey];
        if(blob){ try{ await idbPut(nk, blob); newFiles.push({key:nk,name:x.files[i].name,type:x.files[i].type}); }catch(e){} }
      }
      // try to auto-link to an existing matter by client+caseNo
      let matterId="";
      if(x.matterClient){
        const m = DB.matters.find(mm => mm.client===x.matterClient && (!x.caseNo || (mm.caseNo||"")===x.caseNo));
        if(m) matterId=m.id;
      }
      DB[destKey].push(Object.assign({}, x, {id:newId, files:newFiles, matterId}));
      nd++;
    }
  }
  await importDocs(b.docsIn, "docsIn");
  await importDocs(b.docsFiled, "docsFiled");

  DB.staffLog = DB.staffLog || [];
  DB.staffLog.push({at:new Date().toISOString(), station:b.station||"staff", nr, ne, nd});
  // capture personal-billing summaries (staff name, client, amount only)
  if(Array.isArray(b.personalSummary) && b.personalSummary.length){
    DB.personalLog = DB.personalLog || [];
    b.personalSummary.forEach(p=>{
      DB.personalLog.push({ at:new Date().toISOString(), staff:p.staff||b.station||"staff",
        client:p.client||"", amount:+p.amount||0, kind:p.kind||"receipt", date:p.date||"" });
    });
  }
  _pendingBatch=null; save(); renderAll(); go("staff");
  const pn = (Array.isArray(b.personalSummary)?b.personalSummary.length:0);
  toast(`Imported ${nr} receipt(s), ${ne} expense(s), ${nd} document(s)${pn?`, and ${pn} personal billing summary line(s)`:""} from ${b.station||"staff"}.`);
}

function genHandoverKey(){
  const al="ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnpqrstuvwxyz23456789";
  const r=crypto.getRandomValues(new Uint8Array(32));
  let k=""; for(let i=0;i<32;i++) k+=al[r[i]%al.length];
  const el=document.getElementById("stHandoverKey"); if(el) el.value=k;
  toast("New key generated. Save settings, then copy it into the staff config.");
}

  save(); renderAll(); toast("Settings saved.");
}

/* ===========================================================
   ARCHIVE — everything catalogued by year and month
   Pulls together receipts, invoices, expenses, documents and
   imported staff handovers into one browsable timeline.
   =========================================================== */
function monthKey(iso){ return (iso||"").slice(0,7); } // YYYY-MM
function monthLabel(ym){
  if(!ym || ym.length<7) return "Undated";
  const [y,m]=ym.split("-");
  const mon=["January","February","March","April","May","June","July","August","September","October","November","December"][+m-1]||"";
  return `${mon} ${y}`;
}
let _archiveOpen = {}; // track expanded months

function buildArchiveIndex(){
  // returns { year: { ym: {receipts:[], invoices:[], expenses:[], docsIn:[], docsFiled:[], imports:[] , fees, exp} } }
  const idx = {};
  function bucket(ym){
    const yr = ym && ym.length>=4 ? ym.slice(0,4) : "Undated";
    idx[yr] = idx[yr] || {};
    idx[yr][ym] = idx[yr][ym] || {receipts:[],invoices:[],expenses:[],docsIn:[],docsFiled:[],imports:[],fees:0,exp:0,inv:0};
    return idx[yr][ym];
  }
  (DB.receipts||[]).forEach(r=>{ const b=bucket(monthKey(r.date)); b.receipts.push(r); b.fees+=+r.amount||0; });
  (DB.invoices||[]).forEach(v=>{ const b=bucket(monthKey(v.date));
    const t=(v.lines||[]).reduce((s,l)=>s+(+l.amount||0),0)+(v.expenses||[]).reduce((s,l)=>s+(+l.amount||0),0);
    b.invoices.push(v); b.inv+=t; });
  (DB.expenses||[]).forEach(e=>{ const b=bucket(monthKey(e.date)); b.expenses.push(e); b.exp+=+e.amount||0; });
  (DB.docsIn||[]).forEach(d=>{ const b=bucket(monthKey(d.date||d.received)); b.docsIn.push(d); });
  (DB.docsFiled||[]).forEach(d=>{ const b=bucket(monthKey(d.date||d.filed)); b.docsFiled.push(d); });
  (DB.staffLog||[]).forEach(l=>{ const b=bucket(monthKey(l.at)); b.imports.push(l); });
  return idx;
}

function renderArchive(){
  const idx = buildArchiveIndex();
  const years = Object.keys(idx).sort((a,b)=>b.localeCompare(a)); // newest first
  let body="";
  if(!years.length){
    body = `<div class="card"><div class="empty">Nothing archived yet. As you add receipts, invoices, expenses, documents and import staff entries, they'll be catalogued here by month and year.</div></div>`;
  } else {
    for(const yr of years){
      const months = Object.keys(idx[yr]).sort((a,b)=>b.localeCompare(a));
      // year totals
      let yFees=0,yExp=0,yInv=0,yR=0,yV=0,yD=0,yI=0;
      months.forEach(ym=>{const m=idx[yr][ym]; yFees+=m.fees;yExp+=m.exp;yInv+=m.inv;yR+=m.receipts.length;yV+=m.expenses.length;yD+=m.docsIn.length+m.docsFiled.length;yI+=m.imports.length;});
      body += `<div class="card">
        <div class="card-head"><div>
          <h2 style="margin-bottom:2px">${esc(yr)}</h2>
          <div class="hint" style="margin:0">${yR} receipts · ${yV} vouchers · ${yInv?fmtINR(yInv)+" invoiced · ":""}${yD} documents · ${yI} imports</div>
        </div>
        <div style="text-align:right"><div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em">Fees received</div>
          <div style="font-size:20px;font-weight:700;color:var(--seal)">${fmtINR(yFees)}</div></div></div>
        <div style="margin-top:10px">`;
      for(const ym of months){
        const m = idx[yr][ym];
        const open = !!_archiveOpen[ym];
        const count = m.receipts.length+m.invoices.length+m.expenses.length+m.docsIn.length+m.docsFiled.length+m.imports.length;
        body += `<div class="arch-month">
          <div class="arch-mhead" onclick="toggleArchMonth('${ym}')">
            <div><span class="arch-caret">${open?"▾":"▸"}</span> <b>${esc(monthLabel(ym))}</b>
              <span style="color:var(--muted);font-size:12.5px;margin-left:8px">${count} item${count!==1?"s":""}</span></div>
            <div style="font-size:12.5px;color:var(--muted)">${m.fees?"Fees "+fmtINR(m.fees):""}${m.exp?" · Exp "+fmtINR(m.exp):""}</div>
          </div>
          ${open?renderArchMonthDetail(m):""}
        </div>`;
      }
      body += `</div></div>`;
    }
  }
  document.getElementById("panel-archive").innerHTML = `
    <div class="card">
      <h2>Archive</h2>
      <div class="hint">Your complete chamber record, catalogued by year and month — receipts, invoices, expenses, documents, and imported staff entries. This grows with you over the years.</div>
      <div class="btn-row" style="margin-top:8px">
        <button class="btn ghost sm" onclick="exportArchiveCSV()">Export full archive (CSV)</button>
      </div>
    </div>
    ${body}`;
}
function toggleArchMonth(ym){ _archiveOpen[ym]=!_archiveOpen[ym]; renderArchive(); go("archive"); }

function renderArchMonthDetail(m){
  let out = `<div class="arch-detail">`;
  if(m.receipts.length){
    out += `<div class="arch-sec"><div class="arch-sec-t">Receipts</div><table class="arch-tbl"><tbody>`;
    m.receipts.sort((a,b)=>(a.date||"").localeCompare(b.date||"")).forEach(r=>{
      out += `<tr><td class="mono">${esc(r.no||"")}</td><td>${fmtDate(r.date)}</td><td>${esc(matterLabel(r.matterId))}</td><td class="num">${fmtINR(r.amount)}</td></tr>`;
    });
    out += `</tbody></table></div>`;
  }
  if(m.invoices.length){
    out += `<div class="arch-sec"><div class="arch-sec-t">Invoices</div><table class="arch-tbl"><tbody>`;
    m.invoices.sort((a,b)=>(a.date||"").localeCompare(b.date||"")).forEach(v=>{
      const t=(v.lines||[]).reduce((s,l)=>s+(+l.amount||0),0)+(v.expenses||[]).reduce((s,l)=>s+(+l.amount||0),0);
      out += `<tr><td class="mono">${esc(v.no||"")}</td><td>${fmtDate(v.date)}</td><td>${esc(matterLabel(v.matterId))}</td><td class="num">${fmtINR(t)}</td></tr>`;
    });
    out += `</tbody></table></div>`;
  }
  if(m.expenses.length){
    out += `<div class="arch-sec"><div class="arch-sec-t">Expenses</div><table class="arch-tbl"><tbody>`;
    m.expenses.sort((a,b)=>(a.date||"").localeCompare(b.date||"")).forEach(e=>{
      out += `<tr><td class="mono">${esc(e.voucherNo||"")}</td><td>${fmtDate(e.date)}</td><td>${esc(e.head||"")}${e.payee?" · "+esc(e.payee):""}</td><td class="num">${fmtINR(e.amount)}</td></tr>`;
    });
    out += `</tbody></table></div>`;
  }
  if(m.docsIn.length || m.docsFiled.length){
    out += `<div class="arch-sec"><div class="arch-sec-t">Documents</div><table class="arch-tbl"><tbody>`;
    [...m.docsIn.map(d=>({d,k:"Inward"})), ...m.docsFiled.map(d=>({d,k:"Filed"}))]
      .sort((a,b)=>((a.d.date||"")).localeCompare(b.d.date||"")).forEach(({d,k})=>{
      out += `<tr><td>${esc(k)}</td><td>${fmtDate(d.date)}</td><td>${esc(d.title||d.desc||"—")}</td><td>${esc(matterLabel(d.matterId)||"")}</td></tr>`;
    });
    out += `</tbody></table></div>`;
  }
  if(m.imports.length){
    out += `<div class="arch-sec"><div class="arch-sec-t">Staff imports</div><table class="arch-tbl"><tbody>`;
    m.imports.forEach(l=>{ out += `<tr><td>${fmtDate(l.at.slice(0,10))}</td><td>${esc(l.station||"")}</td><td>${l.nr} receipts, ${l.ne} expenses</td><td></td></tr>`; });
    out += `</tbody></table></div>`;
  }
  out += `</div>`;
  return out;
}

function exportArchiveCSV(){
  const rows=[["Type","Number","Date","Matter/Head","Party/Payee","Amount","RecordedBy"]];
  (DB.receipts||[]).forEach(r=>{const m=matterById(r.matterId)||{};rows.push(["Receipt",r.no||"",r.date||"",m.code||"",m.client||"",r.amount||"",r.enteredBy||""]);});
  (DB.invoices||[]).forEach(v=>{const m=matterById(v.matterId)||{};const t=(v.lines||[]).reduce((s,l)=>s+(+l.amount||0),0)+(v.expenses||[]).reduce((s,l)=>s+(+l.amount||0),0);rows.push(["Invoice",v.no||"",v.date||"",m.code||"",m.client||"",t,""]);});
  (DB.expenses||[]).forEach(e=>{rows.push(["Expense",e.voucherNo||"",e.date||"",e.head||"",e.payee||"",e.amount||"",e.enteredBy||""]);});
  (DB.docsIn||[]).forEach(d=>{const m=matterById(d.matterId)||{};rows.push(["Inward doc","",d.date||"",d.title||d.desc||"",m.client||"","",""]);});
  (DB.docsFiled||[]).forEach(d=>{const m=matterById(d.matterId)||{};rows.push(["Filed doc",d.iaNo||"",d.date||"",d.title||d.desc||"",m.client||"","",""]);});
  rows.sort((a,b)=>(a[2]||"").localeCompare(b[2]||""));
  const csv = rows.map(r=>r.map(c=>{c=String(c==null?"":c); return /[",\n]/.test(c)?'"'+c.replace(/"/g,'""')+'"':c;}).join(",")).join("\n");
  const blob=new Blob([csv],{type:"text/csv"}); const url=URL.createObjectURL(blob); const a=document.createElement("a");
  a.href=url; a.download=`Chamber-Archive-${todayISO()}.csv`; document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(url),1500);
  toast("Full archive exported as CSV.");
}

const DOC_SOURCES = ["Client","Court","Opposite party / counsel","Government office","Registry","Courier / post","Other"];
const INWARD_TYPES = ["Vakalatnama","Case papers / file","Court order / notice","Affidavit","Agreement / deed",
  "ID / KYC documents","Cheque / DD","Correspondence","Evidence / annexure","Other"];
const FILED_TYPES = ["Main petition / paper-book (full filed copy)","SLP (filed copy)","Writ Petition (filed copy)",
  "Appeal (filed copy)","Interlocutory Application (IA)","Interim Application","Stay Application",
  "Counter / Reply","Rejoinder","Affidavit","Annexure compilation","Vakalatnama","Other filed document"];
let _mDocStaging = [];
function onMDocsPicked(input, infoId){
  const files=[...(input.files||[])]; _mDocStaging=[];
  const info=document.getElementById(infoId); if(!files.length){info.textContent="";return;}
  let done=0; const total=files.length; const collected=[];
  info.textContent=`Reading ${total} file(s)…`;
  files.forEach(f=>{
    if(f.type==="application/pdf"){ const r=new FileReader();
      r.onload=()=>{collected.push({name:f.name,type:f.type,data:r.result,size:f.size});tick();}; r.readAsDataURL(f);
    }else if(f.type.startsWith("image/")){ const r=new FileReader();
      r.onload=()=>{const img=new Image();img.onload=()=>{const max=1800;let{width:w,height:h}=img;
        if(w>max||h>max){const s=max/Math.max(w,h);w=Math.round(w*s);h=Math.round(h*s);}
        const c=document.createElement("canvas");c.width=w;c.height=h;c.getContext("2d").drawImage(img,0,0,w,h);
        const out=c.toDataURL("image/jpeg",0.82);collected.push({name:f.name.replace(/\.\w+$/,"")+".jpg",type:"image/jpeg",data:out,size:Math.round(out.length*0.75)});tick();
      };img.src=r.result;}; r.readAsDataURL(f);
    }else{collected.push(null);tick();}
  });
  function tick(){done++;if(done===total){_mDocStaging=collected.filter(Boolean);
    const kb=_mDocStaging.reduce((s,x)=>s+(x.size||0),0)/1024;
    info.textContent=`${_mDocStaging.length} file(s) ready (~${kb>1024?(kb/1024).toFixed(1)+" MB":Math.round(kb)+" KB"}).`;}}
}

function renderDocIn(){
  const list=[...DB.docsIn].sort((a,b)=>(b.date||"").localeCompare(a.date||""));
  const rows=list.map(d=>{

      <td>${esc(d.docType||"")}</td><td>${esc(d.source||"")}</td><td>${mlabel}</td>

      <td style="white-space:nowrap"><button class="row-act" onclick="viewDoc('docsIn','${d.id}')">View</button>

/* ===========================================================
   EXPORT DOCUMENTS TO A REAL FOLDER (catalogued case files)
   Uses File System Access API (Chrome/Edge desktop). Falls
   back to a downloadable ZIP where unsupported.
   =========================================================== */
function fsSupported(){ return typeof window!=="undefined" && "showDirectoryPicker" in window; }
function safeName(s){ return (s||"").replace(/[\/\\:*?"<>|]/g,"-").replace(/\s+/g," ").trim().slice(0,120); }
function dataURLtoBlob(dataURL){
  try{
    const [head,b64]=dataURL.split(",");
    const mime=(head.match(/data:(.*?);/)||[])[1]||"application/octet-stream";
    const bin=atob(b64); const arr=new Uint8Array(bin.length);
    for(let i=0;i<bin.length;i++) arr[i]=bin.charCodeAt(i);
    return new Blob([arr],{type:mime});
  }catch(e){ return null; }
}
function matterFolderName(m){
  if(!m) return "Unassigned";
  const bits=[m.code, safeName(m.client)];
  if(m.caseNo) bits.push(safeName(m.caseNo).replace(/\//g,"-"));
  return safeName(bits.join("  "));
}
function docsForMatter(matterId){
  return {
    filed: DB.docsFiled.filter(d=>d.matterId===matterId),
    inward: DB.docsIn.filter(d=>d.matterId===matterId)
  };
}
function buildIndexText(m, sets){
  const L=[];
  L.push("CASE DOCUMENT INDEX");
  L.push("=".repeat(40));
  if(m){ L.push("Matter code : "+m.code); L.push("Client      : "+m.client);
    if(m.parties) L.push("Parties     : "+m.parties);
    if(m.caseNo) L.push("Case no.    : "+m.caseNo);
    if(m.court) L.push("Forum       : "+m.court);
  } else L.push("Unassigned documents");
  L.push("Generated   : "+new Date().toLocaleString());
  L.push("");
  function section(title, arr){
    L.push(title); L.push("-".repeat(title.length));
    if(!arr.length){ L.push("(none)"); L.push(""); return; }
    arr.forEach(d=>{
      (d.files||[]).forEach((f,i)=>{
        const fname = fileNameFor(d, f, i);
        L.push(`${fmtDate(d.date)}  ${fname}`);
      });
      const extra=[d.docType, d.source?("from "+d.source):"", d.iaNo, d.notes, d.enteredBy&&d.enteredBy!=="(self)"?("logged by "+d.enteredBy):""].filter(Boolean).join(" · ");
      if(extra) L.push("    "+extra);
    });
    L.push("");
  }
  section("FILED RECORDS", sets.filed);
  section("INWARD DOCUMENTS", sets.inward);
  return L.join("\n");
}
function fileNameFor(d, f, i){
  const ext = (f.name && f.name.includes(".")) ? f.name.slice(f.name.lastIndexOf(".")) : (f.type==="application/pdf"?".pdf":".jpg");
  const base = safeName(d.title) + (((d.files||[]).length>1)?(" ("+(i+1)+")"):"");
  return `${d.date}  ${base}${ext}`;
}

async function writeMatterToDir(parentDir, m, sets){
  const folderName = matterFolderName(m);
  const dir = await parentDir.getDirectoryHandle(folderName, {create:true});
  async function writeSet(subName, arr){
    if(!arr.length) return 0;
    const sub = await dir.getDirectoryHandle(subName, {create:true});
    let n=0;
    for(const d of arr){
      for(let i=0;i<(d.files||[]).length;i++){
        const f=d.files[i];
        let data; try{ data=await idbGet(f.key); }catch(e){}
        if(!data) continue;
        const blob=dataURLtoBlob(data); if(!blob) continue;
        const fh=await sub.getFileHandle(fileNameFor(d,f,i), {create:true});
        const w=await fh.createWritable(); await w.write(blob); await w.close(); n++;
      }
    }
    return n;
  }
  const nf=await writeSet("Filed", sets.filed);
  const ni=await writeSet("Inward", sets.inward);
  // index file
  const idx=await dir.getFileHandle("_index.txt",{create:true});
  const w=await idx.createWritable(); await w.write(buildIndexText(m,sets)); await w.close();
  return nf+ni;
}

async function exportMatterToFolder(matterId){
  const m = matterById(matterId);
  const sets = docsForMatter(matterId);
  if(!sets.filed.length && !sets.inward.length){ toast("No documents for this matter yet.",true); return; }
  if(fsSupported()){
    try{
      const parent = await window.showDirectoryPicker({mode:"readwrite"});
      const n = await writeMatterToDir(parent, m, sets);
      toast(`Saved ${n} file(s) to ${matterFolderName(m)}.`);
    }catch(e){ if(e && e.name==="AbortError") return; toast("Could not write to that folder.",true); }
  }else{
    await exportMatterAsZip(m, sets);
  }
}
async function exportAllToFolder(){
  if(!DB.docsFiled.length && !DB.docsIn.length){ toast("No documents to export.",true); return; }
  if(fsSupported()){
    try{
      const parent = await window.showDirectoryPicker({mode:"readwrite"});
      let total=0, folders=0;
      // one folder per matter that has docs
      const matterIds = new Set([...DB.docsFiled, ...DB.docsIn].map(d=>d.matterId||""));
      for(const mid of matterIds){
        const m = mid? matterById(mid) : null;
        const sets = mid? docsForMatter(mid) : {filed:DB.docsFiled.filter(d=>!d.matterId), inward:DB.docsIn.filter(d=>!d.matterId)};
        if(!sets.filed.length && !sets.inward.length) continue;
        total += await writeMatterToDir(parent, m, sets); folders++;
      }
      toast(`Exported ${total} file(s) across ${folders} case folder(s).`);
    }catch(e){ if(e && e.name==="AbortError") return; toast("Could not write to that folder.",true); }
  }else{
    toast("Folder export needs Chrome or Edge on desktop. Downloading a ZIP instead.");
    await exportAllAsZip();
  }
}

/* ---- ZIP fallback (Safari/iPhone) via a tiny zip builder ---- */
function crc32(buf){
  let c, table=crc32.t||(crc32.t=(()=>{const t=[];for(let n=0;n<256;n++){c=n;for(let k=0;k<8;k++)c=c&1?0xEDB88320^(c>>>1):c>>>1;t[n]=c>>>0;}return t;})());
  let crc=0xFFFFFFFF; for(let i=0;i<buf.length;i++) crc=(crc>>>8)^table[(crc^buf[i])&0xFF];
  return (crc^0xFFFFFFFF)>>>0;
}
function strBytes(s){ return new TextEncoder().encode(s); }
function buildZip(files){ // files:[{path,bytes}]
  const chunks=[], central=[]; let offset=0;
  const dosTime=0, dosDate=0x21;
  for(const f of files){
    const nameB=strBytes(f.path); const data=f.bytes; const crc=crc32(data);
    const local=new Uint8Array(30+nameB.length);
    const dv=new DataView(local.buffer);
    dv.setUint32(0,0x04034b50,true); dv.setUint16(4,20,true); dv.setUint16(6,0,true);
    dv.setUint16(8,0,true); dv.setUint16(10,dosTime,true); dv.setUint16(12,dosDate,true);
    dv.setUint32(14,crc,true); dv.setUint32(18,data.length,true); dv.setUint32(22,data.length,true);
    dv.setUint16(26,nameB.length,true); dv.setUint16(28,0,true);
    local.set(nameB,30);
    chunks.push(local, data);
    const cen=new Uint8Array(46+nameB.length); const cv=new DataView(cen.buffer);
    cv.setUint32(0,0x02014b50,true); cv.setUint16(4,20,true); cv.setUint16(6,20,true);
    cv.setUint16(8,0,true); cv.setUint16(10,0,true); cv.setUint16(12,dosTime,true); cv.setUint16(14,dosDate,true);
    cv.setUint32(16,crc,true); cv.setUint32(20,data.length,true); cv.setUint32(24,data.length,true);
    cv.setUint16(28,nameB.length,true); cv.setUint32(42,offset,true); cen.set(nameB,46);
    central.push(cen);
    offset+=local.length+data.length;
  }
  let cenSize=0; central.forEach(c=>cenSize+=c.length);
  const end=new Uint8Array(22); const ev=new DataView(end.buffer);
  ev.setUint32(0,0x06054b50,true); ev.setUint16(8,files.length,true); ev.setUint16(10,files.length,true);
  ev.setUint32(12,cenSize,true); ev.setUint32(16,offset,true);
  return new Blob([...chunks,...central,end],{type:"application/zip"});
}
async function collectFilesForZip(m, sets, rootName){
  const out=[];
  async function add(subName, arr){
    for(const d of arr){
      for(let i=0;i<(d.files||[]).length;i++){
        const f=d.files[i]; let data; try{data=await idbGet(f.key);}catch(e){}
        if(!data) continue; const blob=dataURLtoBlob(data); if(!blob) continue;
        const bytes=new Uint8Array(await blob.arrayBuffer());
        out.push({path:`${rootName}/${subName}/${fileNameFor(d,f,i)}`, bytes});
      }
    }
  }
  await add("Filed", sets.filed); await add("Inward", sets.inward);
  out.push({path:`${rootName}/_index.txt`, bytes:strBytes(buildIndexText(m,sets))});
  return out;
}
async function exportMatterAsZip(m, sets){
  const root=matterFolderName(m);
  const files=await collectFilesForZip(m,sets,root);
  const zip=buildZip(files); downloadBlob(zip, root+".zip");
  toast("Case documents downloaded as a ZIP.");
}
async function exportAllAsZip(){
  let all=[];
  const matterIds=new Set([...DB.docsFiled,...DB.docsIn].map(d=>d.matterId||""));
  for(const mid of matterIds){
    const m=mid?matterById(mid):null;
    const sets=mid?docsForMatter(mid):{filed:DB.docsFiled.filter(d=>!d.matterId),inward:DB.docsIn.filter(d=>!d.matterId)};
    if(!sets.filed.length&&!sets.inward.length) continue;
    const part=await collectFilesForZip(m,sets,matterFolderName(m)); all=all.concat(part);
  }
  if(!all.length){ toast("Nothing to export.",true); return; }
  downloadBlob(buildZip(all), "Chamber-Cases-"+todayISO()+".zip");
  toast("All case documents downloaded as a ZIP.");
}
function downloadBlob(blob, name){
  const url=URL.createObjectURL(blob); const a=document.createElement("a");
  a.href=url; a.download=name; document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1500);
}
